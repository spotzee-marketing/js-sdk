name: Publish Packages

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  npmjs:
    name: Publish to npmjs.org
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # id-token: write is what makes the OIDC handshake work — npm verifies
      # the GitHub Actions identity against the package's Trusted Publisher
      # config (set on npmjs.com/package/@spotzee/js-sdk/access) and issues a
      # short-lived publish credential. No NPM_TOKEN is used.
      id-token: write
    if: github.repository_owner == 'spotzee-marketing'
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          cache: 'npm'

      # npm Trusted Publishing requires npm CLI >= 11.5.1, which Node 22.x
      # does not bundle (it ships npm 10.x). Pin the latest npm 11 line.
      - name: Upgrade npm to >=11.5.1
        run: npm install -g npm@latest

      - run: npm ci
      - run: npm run package:build

      # Don't use the package:publish script: it runs `npm version` which
      # errors when package.json is already at the target version (we bump
      # package.json + jsr.json in the same commit as the tag, so `npm version`
      # would refuse with "version not changed").
      - name: npm publish
        run: npm publish --access public
        # Provenance is generated automatically under Trusted Publishing —
        # no --provenance flag and no NODE_AUTH_TOKEN env var.

  jsr:
    name: Publish to JSR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    if: github.repository_owner == 'spotzee-marketing'
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      # JSR requires jsr.json's version to match the published version.
      # Override on the runner only — never committed back.
      - name: Sync jsr.json version with git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs');const p='jsr.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.version='$VERSION';fs.writeFileSync(p, JSON.stringify(j,null,2)+'\n')"
          echo "Publishing @spotzee/js-sdk@$VERSION to JSR"

      - name: jsr publish
        run: npx jsr publish
