name: Publish Packages

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  npmjs:
    name: Publish to npmjs.org
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # id-token: write is what makes the OIDC handshake work — npm verifies
      # the GitHub Actions identity against the package's Trusted Publisher
      # config (set on npmjs.com/package/@spotzee/js-sdk/access) and issues a
      # short-lived publish credential. No NPM_TOKEN is used.
      id-token: write
    if: github.repository_owner == 'spotzee-marketing'
    steps:
      - uses: actions/checkout@v4

      # Node 24.x ships npm >= 11.5.1, which Trusted Publishing requires.
      # Stay off in-place `npm install -g npm@latest` upgrades — they hit
      # MODULE_NOT_FOUND mid-upgrade ("Cannot find module 'promise-retry'")
      # because the running npm process loses track of its own deps.
      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          cache: 'npm'

      - run: npm ci
      - run: npm run package:build

      # Don't use the package:publish script: it runs `npm version` which
      # errors when package.json is already at the target version (we bump
      # package.json in the same commit as the tag, so `npm version`
      # would refuse with "version not changed").
      - name: npm publish
        run: npm publish --access public
        # Provenance is generated automatically under Trusted Publishing —
        # no --provenance flag and no NODE_AUTH_TOKEN env var.

# JSR publish is intentionally not configured. JSR rejects packages whose
# license isn't a recognised SPDX open-source identifier; this SDK is under
# a proprietary "Spotzee Proprietary License" (no modification, no
# redistribution of derivatives), which JSR does not accept. If the SDK is
# ever re-licensed under MIT / Apache-2.0 / similar, a JSR job can be added
# back here.
